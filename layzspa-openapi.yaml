components:
  securitySchemes:
    AuthorizationToken:
      type: apiKey
      in: header
      name: Authorization
      description: "Format observed in app: `token <token>`"
    GizToken:
      type: apiKey
      in: header
      name: giz_Token
    AppId:
      type: apiKey
      in: header
      name: appid
    Nonce:
      type: apiKey
      in: header
      name: nonce
    Timestamp:
      type: apiKey
      in: header
      name: ts
    Signature:
      type: apiKey
      in: header
      name: sign
    PushType:
      type: apiKey
      in: header
      name: pushtype
    AcceptLanguage:
      type: apiKey
      in: header
      name: accept-language
    LanCode:
      type: apiKey
      in: header
      name: lancode
  parameters:
    GenericQuery:
      name: q
      in: query
      required: false
      schema:
        type: string
      description: Placeholder for one or more query parameters passed via Retrofit `@QueryMap`.
  schemas:
    FreeFormObject:
      type: object
      additionalProperties: true
    LoginReq:
      type: object
      required: [account, password, marketing_notification, registration_id, client_id, timezone]
      properties:
        account:
          type: string
        password:
          type: string
        marketing_notification:
          type: integer
        registration_id:
          type: string
        client_id:
          type: string
        timezone:
          type: string
        app_id:
          type: string
          default: AhFLL54HnChhrxcl9ZUJL6QNfolTIB
        brand:
          type: string
          default: Huawei
        push_type:
          type: string
          default: android
        lan_code:
          type: string
      additionalProperties: false
    LoginGuestReq:
      type: object
      required: [visitor_id, registration_id, client_id, marketing_notification, timezone]
      properties:
        visitor_id:
          type: string
        registration_id:
          type: string
        push_type:
          type: string
          default: android
        app_id:
          type: string
          default: AhFLL54HnChhrxcl9ZUJL6QNfolTIB
        lan_code:
          type: string
        brand:
          type: string
          default: Huawei
        client_id:
          type: string
        marketing_notification:
          type: integer
        timezone:
          type: string
        location:
          type: string
      additionalProperties: false
    GIZLoginReq:
      type: object
      required: [account, password, marketing_notification, registration_id, client_id, timezone]
      properties:
        account:
          type: string
        password:
          type: string
        marketing_notification:
          type: integer
        registration_id:
          type: string
        client_id:
          type: string
        timezone:
          type: string
        app_id:
          type: string
          default: 98754e684ec045528b073876c34c7348
          description: Gizwits app id used by the client
        brand:
          type: string
          default: Huawei
        push_type:
          type: string
          default: android
        lan_code:
          type: string
        location:
          type: string
      additionalProperties: false
    SignUpReq:
      type: object
      required: [account]
      properties:
        account:
          type: string
        location:
          type: string
        app_id:
          type: string
          default: AhFLL54HnChhrxcl9ZUJL6QNfolTIB
      additionalProperties: false
    SignPasswordReq:
      type: object
      required: [account, password]
      properties:
        account:
          type: string
        password:
          type: string
        app_id:
          type: string
          default: AhFLL54HnChhrxcl9ZUJL6QNfolTIB
      additionalProperties: false
    CheckAccountReq:
      type: object
      required: [account, check_type]
      properties:
        account:
          type: string
        check_type:
          type: string
        app_id:
          type: string
          default: AhFLL54HnChhrxcl9ZUJL6QNfolTIB
      additionalProperties: false
    ForgetCheckActiveReq:
      type: object
