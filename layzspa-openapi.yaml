openapi: 3.0.3
info:
  title: Lay-Z-Spa Mobile API
  version: 0.1.0
  description: |
    Generated from static analysis of `com.wiltonbradley.layzspaapp` (v2.2.2).

    This spec is reconstructed from Retrofit interfaces and request interceptors
    found in the APK. It is suitable as a working Swagger/OpenAPI baseline, but
    some request/response schemas are intentionally generic because only client
    types and paths were statically available.

    Observed request headers:
    - `Authorization: token <token>`
    - `giz_Token: <giz_token>`
    - `appid: <appId>`
    - `nonce: <32-char random string>`
    - `ts: <unix timestamp>`
    - `sign: MD5(appId + appSecret + nonce + ts).toUpperCase()`
    - `pushtype: Android`
    - `accept-language` or `lancode`

    Embedded app constants:
    - `appId`: `AhFLL54HnChhrxcl9ZUJL6QNfolTIB`
    - `appSecret`: `4ECvVs13enL5AiYSmscNjvlaisklQDz7vWPCCWXcEFjhWfTmLT`
    - `gizappId`: `98754e684ec045528b073876c34c7348`
    - `gizappSecret`: `1d69eda66af64662a6f1b31f0b42eab2`
servers:
  - url: https://smarthub-us.bestwaycorp.com
    description: US production
  - url: https://smarthub-eu.bestwaycorp.com
    description: EU production
  - url: https://smarthub.bestwaycorp.cn
    description: China production
  - url: http://bestway.dev.mxchip.com.cn
    description: Embedded dev target
